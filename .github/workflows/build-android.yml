name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm ci
      - name: Build web assets
        run: npm run build
      - name: Add Capacitor Android
        run: npx cap add android
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Inject Ringtone plugin
        run: bash scripts/setup-android.sh
      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace > ../gradle-output.txt 2>&1 || true
          echo "=== LAST 50 LINES ==="
          tail -50 ../gradle-output.txt
          # Check if APK was actually built
          if find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | grep -q .; then
            echo "APK_BUILT=true"
          else
            echo "APK_BUILT=false"
            echo "=== ERRORS ==="
            grep -i "error:" ../gradle-output.txt | head -20
            exit 1
          fi
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: gradle-output.txt
          retention-days: 3
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: matchreport-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
