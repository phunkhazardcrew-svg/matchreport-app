name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm ci
      - name: Build web assets
        run: npm run build
      - name: Add Capacitor Android
        run: npx cap add android
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Inject Ringtone plugin
        run: bash scripts/setup-android.sh
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Matchreport-v3.4.apk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: matchreport-debug-apk
          path: android/app/build/outputs/apk/debug/Matchreport-v3.4.apk
          retention-days: 30
      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.4
          name: Matchreport v3.4
          body: |
            ## ⚽ Matchreport v3.0

            **5-fach abgesicherter Schlusspfiff:**
            1. setAlarmClock() — hoechste Android-Prioritaet (wie System-Wecker)
            2. WakeLock im AlarmReceiver — CPU bleibt wach waehrend Ton spielt
            3. ForegroundService Backup-Timer — eigener Java-Thread als Absicherung
            4. Batterieoptimierung-Exempt — User wird aufgefordert, Optimierung zu deaktivieren
            5. AudioFocus — pausiert YouTube/Spotify/Aufnahmen waehrend Alarm
            
            Einstellbare Signalton-Dauer (0-120s) und Vibrations-Dauer (0-120s).
            STREAM_ALARM ignoriert Lautlos-Modus. Timer ueberlebt Bildschirmsperre.
            Voller Editier-Zugriff. PDF/Excel Export. Spielarchiv.

            ### Installation
            1. APK herunterladen
            2. Auf Android-Gerät öffnen → Installieren
            3. Ggf. unbekannte Quellen erlauben
          files: android/app/build/outputs/apk/debug/Matchreport-v3.4.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
