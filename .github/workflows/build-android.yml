name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Inject custom Ringtone plugin
        run: bash scripts/setup-android.sh

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
          echo "ANDROID_KEYSTORE_FILE=$GITHUB_WORKSPACE/android/app/release.jks" >> $GITHUB_ENV

      - name: Build debug APK (unsigned)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (signed)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ env.ANDROID_KEYSTORE_FILE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/release.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: matchreport-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
