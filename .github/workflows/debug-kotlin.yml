name: DEBUG Kotlin Plugin
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - run: npx cap add android
      - run: npx cap sync android
      - run: bash scripts/setup-android.sh
      - name: Show MainActivity AFTER injection
        run: cat android/app/src/main/java/com/matchreport/app/MainActivity.java
      - name: Build and show FAILURE reason
        working-directory: android
        run: |
          if ./gradlew assembleDebug --no-daemon 2>&1; then
            echo "BUILD SUCCEEDED"
            find . -name "*.apk" -type f
          else
            echo "========== BUILD FAILED =========="
            echo "Last Gradle output:"
            ./gradlew assembleDebug --no-daemon 2>&1 | grep -v "^$" | tail -30
          fi
