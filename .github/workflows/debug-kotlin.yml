name: DEBUG Kotlin Plugin
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - run: npx cap add android
      - run: npx cap sync android
      - run: bash scripts/setup-android.sh
      - name: ERRORS ONLY
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | grep -iE "^e:|error:|Error |FAILED|cannot find|unresolved" | head -30
          echo "---EXIT CODE---"
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -5
